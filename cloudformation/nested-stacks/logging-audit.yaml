AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Logging & Audit Nested Stack — Cloud Cost Governance Framework
  Deploys CloudTrail, CloudWatch metric filters and alarms for
  critical security events, and an Athena query layer over S3
  for cost and compliance reporting.

  Security events monitored:
    - Root account login
    - Console login without MFA
    - IAM policy changes
    - CloudTrail configuration changes
    - Unauthorized API calls
    - S3 bucket policy changes

# ==============================================================================
# PARAMETERS
# ==============================================================================
Parameters:

  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]

  ProjectTag:
    Type: String

  CostCenterTag:
    Type: String

  AlertTopicArn:
    Type: String
    Description: >
      SNS topic ARN exported by budget-enforcement stack.
      All security alarms publish here so budget and security
      alerts land in one place — one inbox, one response process.


# RESOURCES

Resources:

  AuditTrailBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'cloudtrail-logs-${AWS::AccountId}-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: STANDARD_IA
            ExpirationInDays: 365
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  AuditTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AuditTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt AuditTrailBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${AuditTrailBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt AuditTrailBucket.Arn
              - !Sub '${AuditTrailBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

  # CloudWatch Log Group — CloudTrail streams here for real-time metric filters.
  # Retention set to 90 days. Older logs live in S3 (much cheaper per GB).
  TrailLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/cloudtrail/${Environment}'
      RetentionInDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # IAM role — allows CloudTrail to write to CloudWatch Logs
  CloudTrailLogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'cloudtrail-to-cloudwatch-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudTrailLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt TrailLogGroup.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  GovernanceTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: AuditTrailBucketPolicy
    Properties:
      TrailName: !Sub 'governance-trail-${Environment}'
      IsLogging: true
      IsMultiRegionTrail: true
      IncludeGlobalServiceEvents: true
      EnableLogFileValidation: true
      S3BucketName: !Ref AuditTrailBucket
      CloudWatchLogsLogGroupArn: !GetAtt TrailLogGroup.Arn
      CloudWatchLogsRoleArn: !GetAtt CloudTrailLogsRole.Arn
      EventSelectors:
        - ReadWriteType: WriteOnly
          IncludeManagementEvents: true
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation


  # 2. CLOUDWATCH METRIC FILTERS + ALARMS

  RootLoginFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref TrailLogGroup
      FilterName: !Sub 'root-login-${Environment}'
      FilterPattern: >-
        { $.userIdentity.type = "Root"
        && $.userIdentity.invokedBy NOT EXISTS
        && $.eventType != "AwsServiceEvent" }
      MetricTransformations:
        - MetricName: RootLoginCount
          MetricNamespace: !Sub 'GovernanceFramework/${Environment}'
          MetricValue: '1'
          DefaultValue: 0

  RootLoginAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'root-login-detected-${Environment}'
      AlarmDescription: >
        Root account login detected. This should never happen in a governed
        account. Investigate immediately — check CloudTrail for source IP.
      Namespace: !Sub 'GovernanceFramework/${Environment}'
      MetricName: RootLoginCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn

  #  2b. Console login without MFA
  ConsoleLoginNoMFAFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref TrailLogGroup
      FilterName: !Sub 'console-login-no-mfa-${Environment}'
      FilterPattern: >-
        { $.eventName = "ConsoleLogin"
        && $.additionalEventData.MFAUsed != "Yes"
        && $.userIdentity.type != "AssumedRole" }
      MetricTransformations:
        - MetricName: ConsoleLoginNoMFACount
          MetricNamespace: !Sub 'GovernanceFramework/${Environment}'
          MetricValue: '1'
          DefaultValue: 0

  ConsoleLoginNoMFAAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'console-login-without-mfa-${Environment}'
      AlarmDescription: >
        Console login without MFA detected. Violates MFA enforcement policy.
        Identify the IAM user and enforce MFA immediately.
      Namespace: !Sub 'GovernanceFramework/${Environment}'
      MetricName: ConsoleLoginNoMFACount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn

  #  2c. IAM policy changes

  IAMPolicyChangeFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref TrailLogGroup
      FilterName: !Sub 'iam-policy-change-${Environment}'
      FilterPattern: >-
        { $.eventSource = "iam.amazonaws.com"
        && ($.eventName = "DeleteGroupPolicy"
        || $.eventName = "DeleteRolePolicy"
        || $.eventName = "DeleteUserPolicy"
        || $.eventName = "PutGroupPolicy"
        || $.eventName = "PutRolePolicy"
        || $.eventName = "PutUserPolicy"
        || $.eventName = "CreatePolicy"
        || $.eventName = "DeletePolicy"
        || $.eventName = "CreatePolicyVersion"
        || $.eventName = "DeletePolicyVersion"
        || $.eventName = "SetDefaultPolicyVersion"
        || $.eventName = "AttachRolePolicy"
        || $.eventName = "DetachRolePolicy"
        || $.eventName = "AttachUserPolicy"
        || $.eventName = "DetachUserPolicy") }
      MetricTransformations:
        - MetricName: IAMPolicyChangeCount
          MetricNamespace: !Sub 'GovernanceFramework/${Environment}'
          MetricValue: '1'
          DefaultValue: 0

  IAMPolicyChangeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'iam-policy-change-detected-${Environment}'
      AlarmDescription: >
        IAM policy change detected. Review CloudTrail for full details.
        Unexpected IAM changes are a primary indicator of privilege escalation.
      Namespace: !Sub 'GovernanceFramework/${Environment}'
      MetricName: IAMPolicyChangeCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn

  # --- 2d. CloudTrail configuration changes

  CloudTrailChangeFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref TrailLogGroup
      FilterName: !Sub 'cloudtrail-change-${Environment}'
      FilterPattern: >-
        { $.eventSource = "cloudtrail.amazonaws.com"
        && ($.eventName = "StopLogging"
        || $.eventName = "DeleteTrail"
        || $.eventName = "UpdateTrail"
        || $.eventName = "PutEventSelectors") }
      MetricTransformations:
        - MetricName: CloudTrailChangeCount
          MetricNamespace: !Sub 'GovernanceFramework/${Environment}'
          MetricValue: '1'
          DefaultValue: 0

  CloudTrailChangeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'cloudtrail-configuration-changed-${Environment}'
      AlarmDescription: >
        CloudTrail was modified. This could be an attempt to disable audit
        logging. Treat as HIGH severity until verified.
      Namespace: !Sub 'GovernanceFramework/${Environment}'
      MetricName: CloudTrailChangeCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn

  # --- 2e. Unauthorized API calls ---
  # 5+ access denied errors in 5 minutes = something probing your account.
  UnauthorizedAPIFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref TrailLogGroup
      FilterName: !Sub 'unauthorized-api-calls-${Environment}'
      FilterPattern: >-
        { $.errorCode = "AccessDenied"
        || $.errorCode = "UnauthorizedAccess" }
      MetricTransformations:
        - MetricName: UnauthorizedAPICallCount
          MetricNamespace: !Sub 'GovernanceFramework/${Environment}'
          MetricValue: '1'
          DefaultValue: 0

  UnauthorizedAPIAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'unauthorized-api-calls-${Environment}'
      AlarmDescription: >
        5+ unauthorized API calls in 5 minutes. May indicate credential
        misuse or automated probing. Check CloudTrail for source IP.
      Namespace: !Sub 'GovernanceFramework/${Environment}'
      MetricName: UnauthorizedAPICallCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn

  # --- 2f. S3 bucket policy changes

  S3PolicyChangeFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref TrailLogGroup
      FilterName: !Sub 's3-policy-change-${Environment}'
      FilterPattern: >-
        { $.eventSource = "s3.amazonaws.com"
        && ($.eventName = "PutBucketPolicy"
        || $.eventName = "DeleteBucketPolicy"
        || $.eventName = "PutBucketAcl"
        || $.eventName = "PutBucketCors"
        || $.eventName = "PutBucketLifecycle"
        || $.eventName = "PutBucketReplication") }
      MetricTransformations:
        - MetricName: S3PolicyChangeCount
          MetricNamespace: !Sub 'GovernanceFramework/${Environment}'
          MetricValue: '1'
          DefaultValue: 0

  S3PolicyChangeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 's3-policy-change-${Environment}'
      AlarmDescription: >
        S3 bucket policy or configuration changed. Verify the change was
        authorized — unintended public exposure is a leading cause of breaches.
      Namespace: !Sub 'GovernanceFramework/${Environment}'
      MetricName: S3PolicyChangeCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn

  # 3. ATHENA QUERY LAYER

  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'athena-results-${AWS::AccountId}-${Environment}'
      LifecycleConfiguration:
        Rules:
          - Id: ExpireQueryResults
            Status: Enabled
            ExpirationInDays: 30
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # Athena workgroup
  AthenaWorkgroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub 'governance-${Environment}'
      Description: >
        Workgroup for governance queries — CloudTrail analysis,
        cost reporting, and compliance investigations.
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: true
        BytesScannedCutoffPerQuery: 1073741824
        ResultConfiguration:
          OutputLocation: !Sub 's3://${AthenaResultsBucket}/results/'
          EncryptionConfiguration:
            EncryptionOption: SSE_S3
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # Glue database
  AuditGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub 'governance_audit_${Environment}'
        Description: Glue catalog for CloudTrail logs queried via Athena.

  # CloudTrail table .
  CloudTrailGlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref AuditGlueDatabase
      TableInput:
        Name: cloudtrail_logs
        Description: CloudTrail events partitioned by region and date
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
          'projection.enabled': 'true'
          'projection.region.type': enum
          'projection.region.values': !Ref AWS::Region
          'projection.year.type': integer
          'projection.year.range': '2024,2030'
          'projection.month.type': integer
          'projection.month.range': '1,12'
          'projection.day.type': integer
          'projection.day.range': '1,31'
          'storage.location.template': !Sub >-
            s3://${AuditTrailBucket}/AWSLogs/${AWS::AccountId}/CloudTrail/${!region}/${!year}/${!month}/${!day}
        PartitionKeys:
          - Name: region
            Type: string
          - Name: year
            Type: string
          - Name: month
            Type: string
          - Name: day
            Type: string
        StorageDescriptor:
          Location: !Sub 's3://${AuditTrailBucket}/AWSLogs/${AWS::AccountId}/CloudTrail/'
          InputFormat: com.amazon.emr.cloudtrail.CloudTrailInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: com.amazon.emr.hive.serde.CloudTrailSerde
          Columns:
            - Name: eventversion
              Type: string
            - Name: useridentity
              Type: struct<type:string,principalid:string,arn:string,accountid:string,username:string>
            - Name: eventtime
              Type: string
            - Name: eventsource
              Type: string
            - Name: eventname
              Type: string
            - Name: awsregion
              Type: string
            - Name: sourceipaddress
              Type: string
            - Name: useragent
              Type: string
            - Name: errorcode
              Type: string
            - Name: errormessage
              Type: string
            - Name: requestid
              Type: string
            - Name: eventid
              Type: string
            - Name: eventtype
              Type: string
            - Name: readonly
              Type: string
            - Name: recipientaccountid
              Type: string

# OUTPUTS
Outputs:

  AuditTrailBucketName:
    Description: S3 bucket containing all CloudTrail logs.
    Value: !Ref AuditTrailBucket
    Export:
      Name: !Sub '${AWS::StackName}-AuditTrailBucket'

  TrailLogGroupName:
    Description: CloudWatch Log Group receiving real-time CloudTrail events.
    Value: !Ref TrailLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-TrailLogGroup'

  AthenaWorkgroupName:
    Description: Athena workgroup name for governance queries.
    Value: !Ref AthenaWorkgroup
    Export:
      Name: !Sub '${AWS::StackName}-AthenaWorkgroup'

  AthenaResultsBucketName:
    Description: S3 bucket storing Athena query results.
    Value: !Ref AthenaResultsBucket
    Export:
      Name: !Sub '${AWS::StackName}-AthenaResultsBucket'

  GlueDatabaseName:
    Description: Glue catalog database for Athena queries.
    Value: !Ref AuditGlueDatabase
    Export:
      Name: !Sub '${AWS::StackName}-GlueDatabase'

  SampleAthenaQuery:
    Description: Paste this into the Athena console to query recent IAM changes.
    Value: !Sub >-
      SELECT eventtime, useridentity.arn, eventname, sourceipaddress
      FROM governance_audit_${Environment}.cloudtrail_logs
      WHERE eventsource = 'iam.amazonaws.com'
      ORDER BY eventtime DESC LIMIT 50;
